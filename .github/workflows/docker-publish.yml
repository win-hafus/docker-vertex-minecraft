name: Docker Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  MINECRAFT_IMAGE: ghcr.io/${{ github.repository_owner }}/docker/minecraft-server
  PROXY_IMAGE: ghcr.io/${{ github.repository_owner }}/docker/proxy-server

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Purpur jar
        run: |
          curl -fSL "https://api.purpurmc.org/v2/purpur/1.21.11/2568/download" \
            -o minecraft/purpur.jar

      - name: Download Velocity jar
        run: |
          SHA256=7f97f572222a58a860a3e1164f046f26dd28c5cabab2d1749a8901fe99be77b5
          curl -fSL "https://fill-data.papermc.io/v1/objects/${SHA256}/velocity-3.5.0-SNAPSHOT-599.jar" \
            -o velocity/velocity.jar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push minecraft-server
        uses: docker/build-push-action@v6
        with:
          context: ./minecraft
          push: true
          tags: |
            ${{ env.MINECRAFT_IMAGE }}:latest
            ${{ env.MINECRAFT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push proxy-server
        uses: docker/build-push-action@v6
        with:
          context: ./velocity
          push: true
          tags: |
            ${{ env.PROXY_IMAGE }}:latest
            ${{ env.PROXY_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

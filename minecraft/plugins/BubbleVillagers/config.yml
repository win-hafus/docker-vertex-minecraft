# BubbleVillagers Configuration
# https://github.com/xGinko/VillagerOptimizer

general:
  default-language: en_us
  auto-language: true
  cache-keep-time-seconds: 30
  support-avl-villagers: false
optimization-methods:
  nametag-optimization:
    enable: true
    names:
    - Optimize
    - DisableAI
    nametags-get-consumed: true
    optimize-cooldown-seconds: 600
    notify-player: true
    log: false
  commands:
    unoptimizevillagers:
      max-block-radius: 100
    optimizevillagers:
      max-block-radius: 100
      cooldown-seconds: 600
  auto-optimize-chunk-population:
    enable: false
    threshold: 20
    check-period-ticks: 200
  auto-optimize-trade-hall-population:
    enable: false
    population: 20
    radius-blocks: 16.0
    check-period-ticks: 200
  regional-activity:
    enable: false
    check-radius-blocks: 500.0
    data-keep-time-millis: 10000
    limits:
      pathfind-event: 150
      interact-event: 50
    notify-players: true
    log: false
  workstation-optimization:
    enable: false
    check-linger-duration-ticks: 100
    search-radius-in-blocks: 2.0
    optimize-cooldown-seconds: 600
    only-when-sneaking: true
    notify-player: true
    log: false
  block-optimization:
    enable: false
    materials:
    - LAPIS_BLOCK
    - GLOWSTONE
    - IRON_BLOCK
    optimize-cooldown-seconds: 600
    search-radius-in-blocks: 2.0
    only-when-sneaking: true
    notify-player: true
    log: false
gameplay:
  prevent-trading-with-unoptimized:
    enable: false
    notify-player: true
  unoptimize-on-job-loose:
    enable: true
  villagers-can-be-leashed:
    enable: false
    only-optimized: false
    log: false
  villagers-spawn-as-adults:
    enable: false
  rename-optimized-villagers:
    enable: false
  outline-optimized-villagers:
    enable: false
  prevent-entities-from-targeting-optimized:
    enable: true
  prevent-damage-to-optimized:
    enable: true
    prevent-knockback-from-entity: true
    damage-causes-to-cancel:
    - BLOCK_EXPLOSION
    - CAMPFIRE
    - CONTACT
    - CRAMMING
    - CUSTOM
    - DRAGON_BREATH
    - DROWNING
    - DRYOUT
    - ENTITY_ATTACK
    - ENTITY_EXPLOSION
    - ENTITY_SWEEP_ATTACK
    - FALL
    - FALLING_BLOCK
    - FIRE
    - FIRE_TICK
    - FLY_INTO_WALL
    - FREEZE
    - HOT_FLOOR
    - KILL
    - LAVA
    - LIGHTNING
    - MAGIC
    - MELTING
    - POISON
    - PROJECTILE
    - SONIC_BOOM
    - STARVATION
    - SUFFOCATION
    - SUICIDE
    - THORNS
    - VOID
    - WITHER
    - WORLD_BORDER
  restock-optimized-trades:
    restock-times:
    - 1000
    - 13000
    notify-player: true
    log: false
  level-optimized-profession:
    level-check-cooldown-seconds: 5
    notify-player: true
villager-chunk-limit:
  enable: false
  check-period-in-ticks: 600
  skip-not-fully-loaded-chunks: true
  chunk-check-cooldown-seconds: 5
  log-removals: true
  whitelist:
    enable: false
    professions:
    - NONE
    - NITWIT
  unoptimized:
    max-per-chunk: 20
    removal-priority:
    - NONE
    - NITWIT
    - SHEPHERD
    - FISHERMAN
    - BUTCHER
    - CARTOGRAPHER
    - LEATHERWORKER
    - FLETCHER
    - MASON
    - FARMER
    - ARMORER
    - TOOLSMITH
    - WEAPONSMITH
    - CLERIC
    - LIBRARIAN
  optimized:
    max-per-chunk: 60
    removal-priority:
    - NONE
    - NITWIT
    - SHEPHERD
    - FISHERMAN
    - BUTCHER
    - CARTOGRAPHER
    - LEATHERWORKER
    - FLETCHER
    - MASON
    - FARMER
    - ARMORER
    - TOOLSMITH
    - WEAPONSMITH
    - CLERIC
    - LIBRARIAN
# Plugin Language
# Available: en_us, de_de, it_it, ko_kr, ru_ru, zh_cn
language: en_us

# Performance Settings
optimization:
  # Remove AI from optimized villagers (reduces lag significantly)
  remove-ai: true
  
  # Allow optimized villagers to restock their trades
  allow-restocking: true
  
  # Restock interval in ticks (20 ticks = 1 second)
  # Default: 1200 ticks = 60 seconds = 1 minute
  restock-interval: 1200
  
  # Allow optimized villagers to level up their profession
  allow-leveling: true

# Cooldown Settings (in seconds)
cooldowns:
  # Cooldown between optimizing the same villager
  optimization-cooldown: 300
  
  # Cooldown between using optimization commands
  command-cooldown: 30

# Optimization Methods
methods:
  # Nametag Optimization
  nametag:
    enabled: true
    # Text required on nametag to optimize/unoptimize
    required-name: Optimize
    # Consume nametag when used
    consume-nametag: false
  
  # Block Interaction Optimization
  block:
    enabled: true
    # Blocks that can be used to optimize villagers
    allowed-blocks:
    - GOLD_NUGGET
    - EMERALD
    # Consume block when used
    consume-block: false
  
  # Workstation Optimization
  workstation:
    enabled: true
    # Auto-optimize when villager claims workstation
    auto-optimize-on-claim: false

# Command Settings
commands:
  # Maximum radius for /optimizevillagers and /unoptimizevillagers
  max-radius: 100
  
  # Maximum villagers a single player can optimize
  # Set to -1 for unlimited
  villagers-per-player: 50

# Messages and Notifications
notifications:
  # Show messages when optimizing/unoptimizing
  show-messages: true
  
  # Send action bar messages
  use-action-bar: true
  
  # Play sounds when optimizing
  play-sounds: true
  
  # Sound to play on successful optimization
  success-sound: ENTITY_EXPERIENCE_ORB_PICKUP
  
  # Sound to play on failure
  fail-sound: ENTITY_VILLAGER_NO

# Performance Options
performance:
  # Check for updates on startup
  check-updates: true
  
  # Send anonymous statistics to bStats
  # Help us improve by keeping this enabled!
  enable-metrics: true
  
  # Debug mode (prints extra information to console)
  debug: false

# Advanced Settings
advanced:
  # Save optimized villagers to database
  save-to-database: true
  
  # Database save interval in ticks
  save-interval: 6000
  
  # Prevent optimized villagers from despawning
  prevent-despawn: true
  
  # Protection from other plugins
  protect-from-removal: true

# Integration Settings
integrations:
  # WorldGuard integration
  worldguard:
    enabled: true
    # Only allow optimization in specific regions
    allowed-regions: []
  
  # Vault integration for economy
  vault:
    enabled: false
    # Cost to optimize a villager
    optimize-cost: 0.0
    # Cost to unoptimize a villager
    unoptimize-cost: 0.0

# DO NOT CHANGE - Configuration version
config-version: 2

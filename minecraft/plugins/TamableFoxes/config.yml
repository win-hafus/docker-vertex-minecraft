settings:

  language: ru
  # Шанс приручения в процентах (0-100)
  tame-chance: 100
  
  # Максимальное количество лис на одного игрока
  max-foxes: 5
  
  # Разрешить лисам атаковать мирных животных? (Куриц, кроликов, рыб)
  # Если false, прирученные лисы не будут трогать фермы.
  attack-passive-mobs: false

messages:
  limit-reached: "&cВы достигли лимита лис! (%limit%)"
  tame-success: "&a❤ Лиса приручена! ❤"
  tame-fail: "&cЛиса не доверилась..."
  not-owner: "&cЭто не ваша лиса."
